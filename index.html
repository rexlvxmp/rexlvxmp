  :root{

  *{box-sizing:border-box; margin:0; padding:0;}
  html, body{ height:100%; }

  body{
    background:#000;

    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight:300;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
    /* deterrent only — not real protection, see note in chat */

    user-select:none;
  }

  a{ color:inherit; text-decoration:none; }
  ::selection{ background:var(--ink); color:#000; }
  :focus-visible{ outline:1px solid var(--ink); outline-offset:4px; }

  /* ---------- video backdrop ---------- */

  .backdrop{ position:fixed; inset:0; z-index:0; background:#050505; overflow:hidden; }

  .backdrop video{
    position:absolute;
    top:50%; left:50%;
    min-width:100%; min-height:100%;
    width:auto; height:auto;
    transform:translate(-50%,-50%);
    object-fit:cover;
    filter:grayscale(1) contrast(1.1) brightness(0.55);
    opacity:0.9;
  }

  /* fallback grain+blobs shown until a video src is set / while it loads */
  .fallback{ position:absolute; inset:0; }
  .blob{ position:absolute; border-radius:50%; filter:blur(70px); mix-blend-mode:screen; opacity:0.45; }
  .blob.a{ width:60vw; height:60vw; background:radial-gradient(circle, #4a4a48 0%, transparent 70%); top:-10%; left:-15%; animation:drift1 26s ease-in-out infinite; }
  .blob.b{ width:50vw; height:50vw; background:radial-gradient(circle, #2e2e2c 0%, transparent 70%); bottom:-15%; right:-10%; animation:drift2 32s ease-in-out infinite; }
  @keyframes drift1{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(8vw,10vh) scale(1.15);} }
  @keyframes drift2{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-6vw,-8vh) scale(1.1);} }

  .grain{
    position:absolute; inset:-50%; width:200%; height:200%;
    background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%25" height="100%25" filter="url(%23n)"/></svg>');
    opacity:0.3; mix-blend-mode:overlay; animation:grain 1s steps(2) infinite;
  }
  @keyframes grain{ 0%{transform:translate(0,0);} 50%{transform:translate(-2%,1%);} 100%{transform:translate(1%,-2%);} }

  .vignette{ position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.82) 100%); }

  @media (prefers-reduced-motion: reduce){ .blob, .grain{ animation:none; } }

  /* ---------- content ---------- */

  .shell{
    position:relative;
    z-index:1;
    max-width:720px;
    margin:0 auto;
    min-height:100vh;
    padding:250px 24px 60px;
    display:flex; 
    flex-direction:column; 
    align-items:center; 
    
  }

@media (max-width:600px){
  .shell{ padding-top:32vh; }
}

  .hero{
    display:flex;
    flex-direction:column;

    margin-bottom:56px;
  }

  /* NOTE: placeholder font/treatment — swap once you pick your final look */
  .brand{

}

  nav.pages{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:clamp(8px, 2.5vw, 14px);
    margin-top:26px;
    font-family:'Kvadrug', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight:400;
    font-size:clamp(15px, 5vw, 22px);
    letter-spacing:0.02em;
    text-transform:lowercase;
}
  nav.pages .sep{ color:var(--muted); font-weight:400; }
  nav.pages button{
    background:none; border:none; color:var(--muted); font:inherit; font-family:inherit;
    cursor:pointer; padding:2px 0; transition:color 0.2s ease;
  }
  nav.pages button:hover{ color:var(--ink); }
  nav.pages button.active{ color:var(--ink); }

  .page{ display:none; width:100%; justify-content:center; }
  .page.active{ display:flex; }

  .window{
    width:100%;
    max-width:420px;
    background:rgba(10,10,9,0.55);
    border:1px solid var(--line);
    border-radius:6px;
    padding:30px 26px;
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    animation:winIn 0.32s cubic-bezier(.2,.8,.2,1);
  }

  @keyframes winIn{
    from{ opacity:0; transform:scale(0.94) translateY(10px); }
    to{ opacity:1; transform:scale(1) translateY(0); }
  }

  .reveal-item{
    opacity:1;
  }

  .window.wide{ max-width:640px; }
  .window.social{ max-width:480px; }
  .window.narrow{ max-width:300px; }

  @media (prefers-reduced-motion: reduce){

  .icon-grid{

    justify-content:center;

  }

  .icon-tile{
    width:26px;
    height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink);
    opacity:0.72;

  }
  .icon-tile:hover{ opacity:1; transform:translateY(-2px); }
  .icon-tile.at{ font-size:24px; font-weight:400; line-height:1; }

}

  .cat:first-child{ border-top:none; padding-top:0; }

  .grid{
    display:grid;

    gap:12px;
    margin-bottom:8px;
    width:100%;
  }

  .card{
    position:relative;
    aspect-ratio:3/4;
    border:1px solid var(--line);
    border-radius:2px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;

  .card:hover{ border-color:rgba(242,242,239,0.35); }
  .card .ph{ font-size:12px; letter-spacing:0.08em; color:var(--muted); text-transform:lowercase; text-align:center; padding:0 12px; }
  .card .cap{

<script>
  const nav = document.getElementById('pages');
  nav.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(!btn) return;

    const alreadyOpen = btn.classList.contains('active');

    nav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

    if(alreadyOpen) return; // second click just closes it

    btn.classList.add('active');
    const page = document.getElementById(btn.dataset.page);
    page.classList.add('active');
  });

  // deterrents only — see note in chat about what this does/doesn't do
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('copy', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if((e.ctrlKey || e.metaKey) && ['c','u','s'].includes(k)) e.preventDefault();
  });
  document.querySelectorAll('.copy-tag').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const tag = el.dataset.copy;
      navigator.clipboard?.writeText(tag).then(() => {
        const original = el.title;
        el.title = 'copied!';
        setTimeout(() => { el.title = original; }, 1200);
      });
    });
  });

  const soundBtn = document.getElementById('soundToggle');

  const startSoundOnFirstClick = () => {
    const bgVideo = document.querySelector('.backdrop video');
    if(bgVideo){
      bgVideo.muted = false;
      soundBtn.classList.remove('is-muted');
    }
  };
  document.addEventListener('click', startSoundOnFirstClick, { once:true });

  soundBtn.addEventListener('click', () => {
    const bgVideo = document.querySelector('.backdrop video');
    if(!bgVideo) return;
    bgVideo.muted = !bgVideo.muted;
    soundBtn.classList.toggle('is-muted', bgVideo.muted);
  });
</script>
